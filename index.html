function init(){
  var sups=[],inds=[],locs=[];
  ALL.forEach(function(d){
    if(sups.indexOf(d.supplier)<0)sups.push(d.supplier);
    if(inds.indexOf(d.industry)<0)inds.push(d.industry);
    if(d.location&&locs.indexOf(d.location)<0)locs.push(d.location);
  });
  sups.sort();inds.sort();locs.sort();
  var o=function(a){return a.map(function(v){return'<option value="'+v+'">'+v+'</option>'}).join('')};
  E('fs').innerHTML='<option value="">全部供应商</option>'+o(sups);
  E('fi').innerHTML='<option value="">全部行业</option>'+o(inds);
  E('fl').innerHTML='<option value="">全部地点</option>'+o(locs);
  E('q').addEventListener('input',function(){CP=1;applyFilter()});
  E('fs').addEventListener('change',function(){CP=1;applyFilter()});
  E('ft').addEventListener('change',function(){CP=1;applyFilter()});
  E('fi').addEventListener('change',function(){CP=1;applyFilter()});
  E('fl').addEventListener('change',function(){CP=1;applyFilter()});
  E('ut').textContent=new Date().toLocaleString('zh-CN');
  E('dc').textContent='共 '+ALL.length+' 条数据';
  applyFilter();
}

function applyFilter(){
  var k=E('q').value.toLowerCase(),s=E('fs').value,t=E('ft').value,i=E('fi').value,l=E('fl').value;
  F=ALL.filter(function(d){if(k&&(d.company+d.jobName+d.industry+d.supplier).toLowerCase().indexOf(k)<0)return false;if(s&&d.supplier!==s)return false;if(t&&d.internType!==t)return false;if(i&&d.industry!==i)return false;if(l&&d.location.indexOf(l)<0)return false;return true});
  TP=Math.max(1,Math.ceil(F.length/PS));if(CP>TP)CP=TP;
  renderStats();renderPage();renderPager();
}
function resetAll(){E('q').value='';E('fs').value='';E('ft').value='';E('fi').value='';E('fl').value='';CP=1;applyFilter()}

function renderPager(){
  var p=E('pager');if(TP<=1){p.innerHTML='';return}
  var h='<span>共'+TP+'页</span>';
  for(var i=1;i<=TP;i++){h+='<button class="pg-btn'+(i===CP?' on':'')+'" onclick="goPage('+i+')">'+i+'</button>';if(i===1&&TP>7){h+='<span>...</span>';i=TP-2;}}

function doRecommend(){var t=document.getElementById('rpText').value;var res=document.getElementById('rpRes');if(!t||t.length<6){res.innerHTML='';return}var txt=t.toLowerCase();var kwMap={'金融':['金融','证券','投行','投资','量化','行研','银行','基金','交易','风控','资管','IPO','并购'],'咨询':['咨询','战略','管理','顾问','四大','审计','会计'],'互联网':['互联网','产品','开发','软件','Java','Python','前端','后端','算法','数据','运营','AI','机器学习','代码'],'快消/营销':['市场','营销','品牌','广告','公关','新媒体','快消','零售','电商'],'医疗':['医疗','医药','生物','化学','药','临床','健康'],'科技':['科技','通信','电子','半导体','芯片','硬件','嵌入式'],'媒体':['媒体','新闻','编辑','记者','出版','视频'],'法律':['法律','律师','法务','合规'],'艺术':['艺术','设计','建筑','UI','UX']};var matches=[];for(var ind in kwMap){var s=0;kwMap[ind].forEach(function(k){if(txt.indexOf(k)>=0)s++});if(s>0)matches.push({ind:ind,score:s})}matches.sort(function(a,b){return b.score-a.score});var bySup={};ALL.forEach(function(d){if(!bySup[d.supplier])bySup[d.supplier]=[];bySup[d.supplier].push(d)});var recs=[];for(var sup in bySup){var scored=bySup[sup].map(function(d){var sc=0;var m=matches.find(function(x){return x.ind===d.industry});if(m)sc+=m.score*20;sc+=(d.prestige||2)*3;if(d.price>0)sc+=Math.max(0,(20000-d.price)/1000);if(d.internType&&txt.indexOf(d.internType.replace('实习',''))>=0)sc+=15;return{job:d,score:sc}});scored.sort(function(a,b){return b.score-a.score});if(scored.length>=3)recs.push({supplier:sup,jobs:scored.slice(0,3)})}if(recs.length===0){res.innerHTML='<div style="text-align:center;padding:16px;color:#8c8c8c">未找到匹配岗位，尝试调整简历描述</div>';return}var sc={'职跃':'s1','优职':'s2','职提':'s3'};res.innerHTML='<div style="font-size:11px;color:#8c8c8c;margin-bottom:6px">📊 匹配行业：'+(matches.slice(0,3).map(function(m){return m.ind}).join('、')||'综合')+'</div>'+recs.map(function(r){return'<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:600;color:#8c8c8c;margin-bottom:4px"><span class="bg '+sc[r.supplier]+'">'+r.supplier+'</span></div>'+r.jobs.map(function(j){return'<div class="rp-item" onclick="document.getElementById(\'fs\').value=\''+j.job.supplier+'\';document.getElementById(\'q\').value=\''+j.job.company+'\';applyFilter();toggleRp();window.scrollTo({top:document.getElementById(\'g\').offsetTop-80,behavior:\'smooth\'})"><div class="rp-top"><div><div class="rp-cmp">'+j.job.company+' <span style="font-size:9px">'+(j.job.prestige>=8?'⭐⭐⭐':j.job.prestige>=6?'⭐⭐':j.job.prestige>=4?'⭐':'')+'</span></div><div class="rp-pos">'+j.job.jobName+'</div></div><span class="rp-score">匹配 '+Math.min(99,Math.round(j.score))+'%</span></div><div class="rp-meta"><span>'+j.job.internType+'</span><span>'+(j.job.location||'待定')+'</span><span style="color:#ff4d4f;font-weight:600">'+(j.job.price>0?'¥'+j.job.price.toLocaleString():'面议')+'</span></div></div>'}).join('')+'</div>'}).join('')}
